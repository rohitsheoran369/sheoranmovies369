<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheoran Movies | Cyber OTT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a08;
  --bg-card:#0d1410;
  --bg-nav:rgba(7,10,8,.92);
  --text:#f4f4f5;
  --text-muted:#a1a1aa;
  --gradient:linear-gradient(135deg,#14532d 0%,#16a34a 50%,#22c55e 100%);
  --gradient-bar:linear-gradient(180deg,#16a34a,#22c55e);
  --accent:#22c55e;
  --accent-2:#86efac;
  --glow:rgba(34,197,94,.28);
  --radius:14px;
  --radius-sm:10px;
  --nav-h:72px;
  --font:'Outfit',sans-serif;
  --font-brand:'Orbitron',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{
  -webkit-text-size-adjust:100%;
  scroll-behavior:smooth;
}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
  -webkit-font-smoothing:antialiased;
}

/* subtle scanlines (hacker vibe) */
.scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:3;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 4px
  );
  mix-blend-mode:overlay;
  opacity:.35;
}

/* HEADER */
.app-header{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 20px;
  background:var(--bg);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.logo-box{
  width:42px;
  height:42px;
  border-radius:var(--radius-sm);
  background:var(--gradient);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.logo-box span{
  color:white;
  font-size:18px;
  font-weight:700;
}
.search-wrap{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--bg-card);
  border-radius:999px;
  border:1px solid rgba(255,255,255,.08);
  padding:0 4px 0 16px;
}
.search-wrap input{
  flex:1;
  padding:10px 0;
  background:none;
  border:none;
  color:var(--text);
  font-family:var(--font);
  font-size:.95rem;
}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-wrap input:focus{outline:none}
.search-wrap select{
  padding:6px 10px;
  background:rgba(255,255,255,.06);
  border:none;
  color:var(--text-muted);
  border-radius:999px;
  font-family:var(--font);
  font-size:.85rem;
  cursor:pointer;
}
.search-wrap button{
  padding:8px 14px;
  background:var(--gradient);
  border:none;
  border-radius:999px;
  color:white;
  font-weight:600;
  font-size:.85rem;
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.search-wrap button:hover{
  transform:scale(1.02);
  box-shadow:0 4px 18px var(--glow);
}

/* TYPE TOGGLES */
.type-toggles{
  display:flex;
  gap:6px;
  padding:12px 20px;
  background:var(--bg-card);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.type-toggles button{
  padding:8px 18px;
  background:transparent;
  border:1px solid rgba(139,92,246,.3);
  color:var(--text-muted);
  border-radius:var(--radius-sm);
  font-family:var(--font);
  font-size:.9rem;
  cursor:pointer;
  transition:all .2s;
}
.type-toggles button:hover{
  color:var(--text);
  border-color:rgba(139,92,246,.6);
}
.type-toggles button.active{
  background:var(--gradient);
  color:white;
  border-color:transparent;
}

/* HERO */
.hero{
  min-height:45vh;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:28px 24px;
  position:relative;
  border-radius:0 0 var(--radius) var(--radius);
  overflow:hidden;
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,var(--bg) 20%,transparent 60%);
}
.hero-content{
  position:relative;
  z-index:2;
  max-width:420px;
}
.hero h1{
  font-size:clamp(1.5rem,4vw,2.2rem);
  font-weight:700;
  letter-spacing:.02em;
  background:linear-gradient(135deg,#86efac 0%,#22c55e 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:10px;
}
.hero button{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 24px;
  background:var(--gradient);
  border:none;
  border-radius:var(--radius-sm);
  color:white;
  font-family:var(--font);
  font-weight:600;
  font-size:1rem;
  cursor:pointer;
  box-shadow:0 6px 22px var(--glow);
  transition:transform .2s,box-shadow .2s;
}
.hero button:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 26px var(--glow);
}

/* ROW */
.section-title{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px 20px 12px;
  font-size:1.2rem;
  font-weight:600;
}
.section-bar{
  width:4px;
  height:22px;
  border-radius:2px;
  background:var(--gradient-bar);
}
.row{
  display:flex;
  gap:14px;
  padding:12px 20px 24px;
  overflow-x:auto;
  scroll-behavior:smooth;
  scroll-snap-type:x mandatory;
}
.row::-webkit-scrollbar{display:none}
.row{scrollbar-width:none}
.card{
  position:relative;
  flex-shrink:0;
  scroll-snap-align:start;
  cursor:pointer;
}
.card img{
  width:140px;
  height:200px;
  object-fit:cover;
  border-radius:var(--radius-sm);
  border:2px solid transparent;
  transition:.3s;
}
.card:hover img{
  transform:scale(1.05);
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  border-color:rgba(34,197,94,.55);
}
.card::after{
  content:"▶";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
  color:white;
  text-shadow:0 2px 8px rgba(0,0,0,.8);
  opacity:0;
  transition:.3s;
}
.card:hover::after{opacity:1}

/* SERIES CONTROLS */
#seriesControls{
  display:none;
  padding:16px 20px;
  background:var(--bg-card);
  margin:0 20px;
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.08);
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}
#seriesControls select{
  padding:10px 14px;
  background:var(--bg);
  color:var(--text);
  border:1px solid rgba(139,92,246,.3);
  border-radius:var(--radius-sm);
  font-family:var(--font);
  cursor:pointer;
}
#seriesControls button{
  padding:10px 20px;
  background:var(--gradient);
  border:none;
  color:white;
  font-weight:600;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:transform .2s;
}
#seriesControls button:hover{transform:scale(1.02)}

/* ACTIVITY */
.activity{
  padding:16px 20px 32px;
}
.activity-card{
  display:flex;
  gap:12px;
  align-items:center;
  padding:12px;
  background:var(--bg-card);
  border-radius:var(--radius-sm);
  margin-bottom:10px;
  border:1px solid rgba(255,255,255,.06);
}
.activity-card img{
  width:50px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}
.activity-card strong{
  color:var(--accent);
  cursor:pointer;
}
.activity-card strong:hover{text-decoration:underline}

/* SECTIONS */
.section{
  display:none;
  animation:fade .3s ease;
}
.section.active{display:block}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* MODALS */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.modal.active{display:flex}
.player-modal .player-box{
  width:95%;
  max-width:1000px;
  background:var(--bg);
  border:1px solid rgba(139,92,246,.3);
  border-radius:var(--radius);
  overflow:hidden;
  position:relative;
}
.player-modal iframe{
  width:100%;
  aspect-ratio:16/9;
  border:none;
}
.player-modal .close{
  position:absolute;
  top:-44px;
  right:0;
  font-size:28px;
  color:var(--text);
  cursor:pointer;
  z-index:10;
}

/* LOGIN */
#loginBg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(12px) brightness(35%);
  z-index:-1;
}
.login-box{
  background:rgba(13,13,15,.95);
  border:1px solid rgba(139,92,246,.3);
  padding:32px;
  width:340px;
  max-width:95%;
  text-align:center;
  backdrop-filter:blur(12px);
  border-radius:var(--radius);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-box h2{
  font-family:var(--font-brand);
  font-size:1.5rem;
  margin-bottom:6px;
}
.creator{
  font-size:.9rem;
  color:var(--accent);
  margin-bottom:20px;
  opacity:.9;
}
.login-box input{
  width:100%;
  padding:12px 16px;
  margin:8px 0;
  background:var(--bg-card);
  border:1px solid rgba(255,255,255,.1);
  color:var(--text);
  border-radius:var(--radius-sm);
  font-family:var(--font);
}
.login-box input:focus{
  outline:none;
  border-color:rgba(139,92,246,.5);
}
.auth-buttons{
  display:flex;
  gap:12px;
  margin-top:16px;
  justify-content:center;
}
.auth-buttons button{
  padding:10px 20px;
  border:none;
  cursor:pointer;
  font-weight:600;
  border-radius:var(--radius-sm);
  font-family:var(--font);
  transition:transform .2s,box-shadow .2s;
}
.signup-btn{
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
}
.signup-btn:hover{
  background:rgba(34,197,94,.12);
  transform:scale(1.02);
}
.login-btn{
  background:#E50914;
  color:white;
}
.login-btn:hover{
  transform:scale(1.02);
  box-shadow:0 4px 20px rgba(229,9,20,.4);
}
.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:12px;
  margin-top:16px;
  background:white;
  color:#333;
  border:none;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-weight:600;
  font-family:var(--font);
  transition:transform .2s,box-shadow .2s;
}
.google-btn:hover{
  transform:scale(1.02);
  box-shadow:0 4px 20px rgba(255,255,255,.2);
}
.google-btn img{width:20px}

/* CHAT */
#openChatBtn{
  position:fixed;
  bottom:calc(var(--nav-h) + 12px);
  right:16px;
  background:var(--gradient);
  border:none;
  padding:10px 18px;
  border-radius:999px;
  color:white;
  font-weight:600;
  cursor:pointer;
  z-index:998;
  display:none;
  box-shadow:0 6px 20px var(--glow);
}
#chatBox{
  position:fixed;
  bottom:var(--nav-h);
  right:16px;
  width:300px;
  max-height:380px;
  background:var(--bg);
  border:1px solid rgba(34,197,94,.25);
  border-radius:var(--radius);
  display:flex;
  flex-direction:column;
  z-index:999;
  box-shadow:0 10px 42px rgba(0,0,0,.55);
  overflow:hidden;
}
#chatHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 14px;
  background:var(--bg-card);
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:.9rem;
}
#closeChatBtn{
  background:none;
  border:none;
  color:var(--text-muted);
  cursor:pointer;
  font-size:18px;
}
#chatMessages{
  flex:1;
  overflow-y:auto;
  padding:12px;
  font-size:.9rem;
  max-height:220px;
}
.chat-msg{margin-bottom:8px}
.chat-user{color:var(--accent);font-weight:600}
#chatInputArea{
  display:flex;
  border-top:1px solid rgba(255,255,255,.08);
}
#chatInput{
  flex:1;
  background:var(--bg-card);
  border:none;
  color:var(--text);
  padding:12px 14px;
  font-family:var(--font);
}
#chatInput:focus{outline:none}
#sendBtn{
  background:var(--gradient);
  border:none;
  padding:12px 18px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* PROFILE */
#profileSection{
  padding:24px 20px 40px;
}
#profileSection h2{
  margin-bottom:20px;
  font-size:1.4rem;
}
#avatarImg{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(139,92,246,.3);
  margin-bottom:16px;
}
.profile-row{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}
.profile-row h3{font-size:1.1rem}
#profileSection button{
  padding:8px 16px;
  background:var(--bg-card);
  border:1px solid rgba(139,92,246,.3);
  color:var(--text);
  border-radius:var(--radius-sm);
  font-family:var(--font);
  cursor:pointer;
  margin-right:8px;
  margin-top:8px;
  transition:all .2s;
}
#profileSection button:hover{
  background:rgba(34,197,94,.10);
  border-color:rgba(34,197,94,.35);
}
#usernameInput{
  padding:10px 14px;
  background:var(--bg-card);
  color:var(--text);
  border:1px solid rgba(139,92,246,.3);
  border-radius:var(--radius-sm);
  font-family:var(--font);
  margin-top:8px;
  width:200px;
}
#profileSection .stats{
  margin:20px 0;
  display:flex;
  gap:24px;
}
#profileSection .stats h3{
  font-size:1rem;
  color:var(--text-muted);
}
#profileSection .stats span{color:var(--accent);font-weight:600}
#posterGrid{
  margin-top:16px;
}
#posterGrid img{
  width:80px;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  margin-right:8px;
}

/* PUBLIC PROFILE */
#publicSection{
  padding:24px 20px 40px;
}
#publicSection h2{margin-bottom:16px;font-size:1.3rem}
#publicGrid img{
  width:100px;
  height:140px;
  object-fit:cover;
  border-radius:var(--radius-sm);
  margin-right:10px;
  margin-bottom:10px;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:var(--nav-h);
  height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--bg-nav);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:8px;
  z-index:100;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:8px 14px;
  border-radius:var(--radius-sm);
  color:var(--text-muted);
  text-decoration:none;
  font-size:.7rem;
  font-weight:500;
  transition:all .2s;
  background:none;
  border:none;
  cursor:pointer;
  font-family:var(--font);
}
.nav-item:hover{color:var(--text)}
.nav-item.active{
  color:var(--text);
  background:rgba(34,197,94,.14);
  box-shadow:0 0 0 1px rgba(34,197,94,.22);
}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-icon{
  width:24px;
  height:24px;
  flex-shrink:0;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width:768px){
  body{
    padding-bottom:var(--nav-h);
    overflow-x:hidden;
  }

  .app-header{
    flex-direction:column;
    align-items:stretch;
    gap:10px;
    padding:12px 16px;
  }

  .logo-box{
    width:36px;
    height:36px;
    font-size:16px;
    align-self:flex-start;
  }

  .search-wrap{
    flex-direction:column;
    flex-wrap:nowrap;
    padding:12px 14px;
    gap:10px;
    border-radius:var(--radius-sm);
  }

  .search-wrap input{
    padding:12px 0;
    font-size:16px;
    min-height:44px;
  }

  .search-wrap select{
    width:100%;
    padding:12px 14px;
    min-height:44px;
    border-radius:var(--radius-sm);
  }

  .search-wrap button{
    width:100%;
    padding:12px 16px;
    min-height:44px;
    font-size:1rem;
  }

  .type-toggles{
    flex-wrap:wrap;
    padding:10px 16px;
    gap:8px;
  }

  .type-toggles button{
    flex:1;
    min-width:120px;
    padding:12px 16px;
    min-height:44px;
    font-size:.95rem;
  }

  .hero{
    min-height:38vh;
    padding:20px 16px;
    border-radius:0;
  }

  .hero h1{
    font-size:1.25rem;
    line-height:1.3;
  }

  .hero button{
    padding:12px 20px;
    font-size:.95rem;
    min-height:44px;
  }

  .section-title{
    padding:16px 16px 10px;
    font-size:1.1rem;
  }

  .row{
    padding:10px 16px 20px;
    gap:12px;
    -webkit-overflow-scrolling:touch;
  }

  .card img{
    width:110px;
    height:155px;
    min-width:110px;
  }

  #seriesControls{
    margin:0 16px;
    padding:14px 16px;
    flex-direction:column;
  }

  #seriesControls select{
    width:100%;
    min-height:44px;
  }

  #seriesControls button{
    width:100%;
    min-height:44px;
  }

  .activity{
    padding:12px 16px 28px;
  }

  .activity-card{
    padding:10px 12px;
    gap:10px;
  }

  .activity-card img{
    width:44px;
    height:60px;
  }

  .activity-card div{
    font-size:.9rem;
  }

  #profileSection,
  #publicSection{
    padding:20px 16px 32px;
  }

  #profileSection h2,
  #publicSection h2{
    font-size:1.25rem;
  }

  #avatarImg{
    width:88px;
    height:88px;
  }

  .profile-row{
    flex-wrap:wrap;
  }

  #profileSection button{
    min-height:44px;
    padding:10px 16px;
  }

  .stats{
    flex-direction:column;
    gap:12px;
  }

  #posterGrid img,
  #publicGrid img{
    width:70px;
    height:100px;
  }

  .login-box{
    width:100%;
    max-width:none;
    margin:0 16px;
    padding:24px 20px;
  }

  .login-box h2{
    font-size:1.3rem;
  }

  .auth-buttons{
    flex-direction:column;
  }

  .auth-buttons button{
    width:100%;
    min-height:44px;
  }

  .google-btn{
    min-height:44px;
  }

  #chatBox{
    bottom:calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
    left:16px;
    right:16px;
    width:auto;
    max-height:50vh;
    max-height:50dvh;
  }

  #openChatBtn{
    bottom:calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 12px);
    right:16px;
    padding:12px 20px;
    min-height:44px;
  }

  .bottom-nav{
    padding:6px 8px;
  }

  .nav-item{
    padding:8px 12px;
    min-height:44px;
    font-size:.65rem;
  }

  .nav-icon{
    width:22px;
    height:22px;
  }

  .player-modal .player-box{
    width:100%;
    margin:0 8px;
  }

  .player-modal .close{
    top:-40px;
    right:8px;
    font-size:24px;
    padding:8px;
  }
}

@media (max-width:480px){
  .hero{
    min-height:35vh;
    padding:16px 12px;
  }

  .hero h1{
    font-size:1.1rem;
  }

  .card img{
    width:100px;
    height:140px;
    min-width:100px;
  }

  .type-toggles button{
    min-width:100%;
  }

  #posterGrid img,
  #publicGrid img{
    width:60px;
    height:85px;
  }
}
</style>
</head>
<body>

<div class="scanlines"></div>

<button id="openChatBtn">Chat</button>

<div id="chatBox">
  <div id="chatHeader">
    <span>Live Chat (<span id="onlineCount">0</span>)</span>
    <button id="closeChatBtn">✕</button>
  </div>
  <div id="chatMessages"></div>
  <div id="chatInputArea">
    <input id="chatInput" placeholder="Type message...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<div id="loginBg"></div>

<header class="app-header">
  <div class="logo-box"><span>S</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search movies or series...">
    <select id="genreSelect">
      <option value="">All Categories</option>
    </select>
    <button id="searchBtn">Search</button>
  </div>
</header>

<div class="type-toggles">
  <button id="movieBtn" class="active">Movies</button>
  <button id="tvBtn">Web Series</button>
</div>

<div id="homeSection" class="section active">
  <section id="hero" class="hero"></section>

  <div id="seriesControls">
    <select id="seasonSelect"></select>
    <select id="episodeSelect"></select>
    <button id="playEpisodeBtn">Play Episode</button>
  </div>

  <h2 class="section-title"><span class="section-bar"></span>Results</h2>
  <div id="popularRow" class="row"></div>

  <h2 class="section-title"><span class="section-bar"></span>Live Activity</h2>
  <div id="activityFeed" class="activity"></div>
</div>

<div id="profileSection" class="section">
  <h2>My Profile</h2>
  <img id="avatarImg" src="https://i.imgur.com/6VBx3io.png" width="120">
  <div class="profile-row">
    <h3 id="usernameDisplay"></h3>
    <button id="editUsernameBtn">Edit</button>
  </div>
  <input type="text" id="usernameInput" style="display:none">
  <button id="saveUsernameBtn" style="display:none">Save</button>
  <p id="userEmail" style="color:var(--text-muted);margin:8px 0"></p>
  <input type="file" id="avatarInput" style="display:none">
  <button id="changeDpBtn">Change DP</button>
  <button id="saveDpBtn" style="display:none">Save DP</button>
  <div class="stats">
    <h3>Total Watched: <span id="totalWatched">0</span></h3>
    <h3>Unique Movies: <span id="uniqueWatched">0</span></h3>
  </div>
  <div id="posterGrid" class="row"></div>
</div>

<div id="publicSection" class="section">
  <h2 id="publicUsername"></h2>
  <div id="publicGrid" class="row"></div>
</div>

<div id="playerModal" class="modal player-modal">
  <div class="player-box">
    <span class="close" onclick="closePlayer()">✕</span>
    <iframe id="playerFrame" allowfullscreen></iframe>
  </div>
</div>

<div id="loginModal" class="modal active">
  <div class="login-box">
    <h2>SHEORAN MOVIES</h2>
    <p class="creator">Creator : Rohit Sheoran</p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <div class="auth-buttons">
      <button class="signup-btn" onclick="signup()">Signup</button>
      <button class="login-btn" onclick="login()">Login</button>
    </div>
    <br>
    <button class="google-btn" onclick="googleLogin()">
      <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png"> Sign in with Google
    </button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="homeNavBtn">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-item" id="profileNavBtn" style="display:none">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
    <span>Profile</span>
  </button>
  <button class="nav-item" id="logoutNavBtn" style="display:none">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    <span>Logout</span>
  </button>
</nav>

<script type="module">
const chatBox=document.getElementById("chatBox");
const openChatBtn=document.getElementById("openChatBtn");
const closeChatBtn=document.getElementById("closeChatBtn");

closeChatBtn.onclick=()=>{
  chatBox.style.display="none";
  openChatBtn.style.display="block";
};

openChatBtn.onclick=()=>{
  chatBox.style.display="flex";
  openChatBtn.style.display="none";
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp,
  query,
  orderBy,
  limit,
  getDocs,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  deleteDoc,
  increment,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyAjTeA-mHOQCBghqL4UhYTMVvl7csVgmMU",
  authDomain:"movie-b0fb1.firebaseapp.com",
  projectId:"movie-b0fb1",
  storageBucket:"movie-b0fb1.firebasestorage.app",
  messagingSenderId:"661798847864",
  appId:"1:661798847864:web:343a62b1b573e4e208348d"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
let cacheData={};
let currentSeriesTitle="";
let currentSeriesPoster="";
let currentUser=null;
let currentType="movie";
let currentSeriesId=null;
const API_KEY="d5585837c92af34f108abad6a1e84115";

function trackOnlineUsers(){
  const userStatusRef=doc(db,"onlineUsers",currentUser.uid);
  setDoc(userStatusRef,{ uid:currentUser.uid, online:true, time:serverTimestamp() });
  window.addEventListener("beforeunload",()=>{ deleteDoc(userStatusRef); });
  onSnapshot(collection(db,"onlineUsers"),(snapshot)=>{
    document.getElementById("onlineCount").innerText=snapshot.size;
  });
}

function startChat(){
  const q=query(collection(db,"globalChat"),orderBy("time","asc"));
  onSnapshot(q,(snapshot)=>{
    const chatMessages=document.getElementById("chatMessages");
    chatMessages.innerHTML="";
    snapshot.forEach(docSnap=>{
      const data=docSnap.data();
      const div=document.createElement("div");
      div.className="chat-msg";
      div.innerHTML=`<span class="chat-user">${data.username||"User"}:</span> ${data.message}`;
      chatMessages.appendChild(div);
    });
    chatMessages.scrollTop=chatMessages.scrollHeight;
  });
}

document.getElementById("sendBtn").onclick=async ()=>{
  if(!currentUser) return;
  const msg=document.getElementById("chatInput").value.trim();
  if(!msg) return;
  const userDoc=await getDoc(doc(db,"users",currentUser.uid));
  const username=userDoc.data()?.username||"User";
  await addDoc(collection(db,"globalChat"),{
    userId:currentUser.uid,
    username,
    message:msg,
    time:serverTimestamp()
  });
  document.getElementById("chatInput").value="";
};

async function loadLoginBackground(){
  try{
    const res=await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`);
    const data=await res.json();
    const movies=data.results.filter(m=>m.backdrop_path);
    const randomMovie=movies[Math.floor(Math.random()*movies.length)];
    document.getElementById("loginBg").style.backgroundImage=`url(https://image.tmdb.org/t/p/original${randomMovie.backdrop_path})`;
  }catch(err){ console.log("BG Error:",err); }
}
window.addEventListener("load",loadLoginBackground);

window.signup=()=>createUserWithEmailAndPassword(auth,document.getElementById("email").value,document.getElementById("password").value);
window.login=()=>signInWithEmailAndPassword(auth,document.getElementById("email").value,document.getElementById("password").value);

onAuthStateChanged(auth,async (user)=>{
  const loginModal=document.getElementById("loginModal");
  const profileNavBtn=document.getElementById("profileNavBtn");
  const logoutNavBtn=document.getElementById("logoutNavBtn");

  if(user){
    const userRef=doc(db,"users",user.uid);
    const snap=await getDoc(userRef);
    if(!snap.exists()){
      await setDoc(userRef,{ username:"User", email:user.email, createdAt:serverTimestamp() });
    }
    currentUser=user;
    loginModal.classList.remove("active");
    profileNavBtn.style.display="flex";
    logoutNavBtn.style.display="flex";
    openChatBtn.style.display="block";
    loadPopular();
    loadActivity();
    startChat();
    trackOnlineUsers();
  }else{
    loginModal.classList.add("active");
    profileNavBtn.style.display="none";
    logoutNavBtn.style.display="none";
  }
});

const provider=new GoogleAuthProvider();
window.googleLogin=async ()=>{
  try{
    const result=await signInWithPopup(auth,provider);
    const user=result.user;
    await setDoc(doc(db,"users",user.uid),{
      username:user.displayName,
      avatar:user.photoURL,
      email:user.email
    },{ merge:true });
  }catch(err){ console.log(err); }
};

function showHome(){
  document.getElementById("homeSection").classList.add("active");
  document.getElementById("profileSection").classList.remove("active");
  document.getElementById("publicSection").classList.remove("active");
  document.getElementById("seriesControls").style.display="none";
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  document.getElementById("homeNavBtn").classList.add("active");
}
function showProfile(){
  document.getElementById("homeSection").classList.remove("active");
  document.getElementById("profileSection").classList.add("active");
  document.getElementById("publicSection").classList.remove("active");
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  document.getElementById("profileNavBtn").classList.add("active");
}

document.getElementById("homeNavBtn").onclick=showHome;

document.getElementById("profileNavBtn").onclick=async ()=>{
  showProfile();
  if(!currentUser) return;

  const posterGrid=document.getElementById("posterGrid");
  posterGrid.innerHTML="";
  let total=0, unique=0;

  const snap=await getDocs(collection(db,"users",currentUser.uid,"watchHistory"));
  snap.forEach(docSnap=>{
    const data=docSnap.data();
    unique++;
    total+=data.watchCount||1;
    const img=document.createElement("img");
    img.src=data.poster;
    posterGrid.appendChild(img);
  });

  document.getElementById("totalWatched").innerText=total;
  document.getElementById("uniqueWatched").innerText=unique;

  const userDoc=await getDoc(doc(db,"users",currentUser.uid));
  const userData=userDoc.data()||{};
  document.getElementById("usernameDisplay").innerText=userData.username||"User";
  document.getElementById("userEmail").innerText=currentUser.email;
  if(userData.avatar){
    document.getElementById("avatarImg").src=userData.avatar||currentUser.photoURL;
  }

  document.getElementById("editUsernameBtn").onclick=()=>{
    document.getElementById("usernameInput").style.display="block";
    document.getElementById("saveUsernameBtn").style.display="inline-block";
    document.getElementById("usernameInput").value=document.getElementById("usernameDisplay").innerText;
  };

  document.getElementById("saveUsernameBtn").onclick=async ()=>{
    const newName=document.getElementById("usernameInput").value.trim();
    if(!newName) return;
    await setDoc(doc(db,"users",currentUser.uid),{ username:newName },{ merge:true });
    document.getElementById("usernameDisplay").innerText=newName;
    document.getElementById("usernameInput").style.display="none";
    document.getElementById("saveUsernameBtn").style.display="none";
  };

  document.getElementById("changeDpBtn").onclick=()=>document.getElementById("avatarInput").click();

  document.getElementById("avatarInput").onchange=()=>{
    const file=document.getElementById("avatarInput").files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async function(e){
      try{
        await setDoc(doc(db,"users",currentUser.uid),{ avatar:e.target.result },{ merge:true });
        document.getElementById("avatarImg").src=e.target.result;
        alert("DP Updated Successfully");
      }catch(err){
        console.error("DP Save Error:",err);
        alert("Error saving DP");
      }
    };
    reader.readAsDataURL(file);
  };
};

document.getElementById("logoutNavBtn").onclick=()=>signOut(auth);

async function loadGenres(){
  const res=await fetch(`https://api.themoviedb.org/3/genre/${currentType}/list?api_key=${API_KEY}`);
  const data=await res.json();
  const genreSelect=document.getElementById("genreSelect");
  genreSelect.innerHTML=`<option value="">All Categories</option>`;
  data.genres.forEach(g=>{
    genreSelect.innerHTML+=`<option value="${g.id}">${g.name}</option>`;
  });
}

document.getElementById("searchBtn").onclick=async ()=>{
  const query=document.getElementById("searchInput").value.trim();
  const genre=document.getElementById("genreSelect").value;
  let url="";
  if(query){
    url=`https://api.themoviedb.org/3/search/${currentType}?api_key=${API_KEY}&query=${encodeURIComponent(query)}`;
  }else if(genre){
    url=`https://api.themoviedb.org/3/discover/${currentType}?api_key=${API_KEY}&with_genres=${genre}`;
  }else{
    loadPopular();
    return;
  }
  const res=await fetch(url);
  const data=await res.json();
  renderResults(data.results);
};

document.getElementById("movieBtn").onclick=()=>{
  showHome();
  currentType="movie";
  loadGenres();
  loadPopular();
  document.getElementById("movieBtn").classList.add("active");
  document.getElementById("tvBtn").classList.remove("active");
};

document.getElementById("tvBtn").onclick=()=>{
  showHome();
  currentType="tv";
  loadGenres();
  loadPopular();
  document.getElementById("tvBtn").classList.add("active");
  document.getElementById("movieBtn").classList.remove("active");
};

async function loadPopular(){
  if(cacheData[currentType]){
    renderResults(cacheData[currentType]);
    loadHero(cacheData[currentType][0]);
    return;
  }
  const res=await fetch(`https://api.themoviedb.org/3/${currentType}/top_rated?api_key=${API_KEY}`);
  const data=await res.json();
  cacheData[currentType]=data.results;
  renderResults(data.results);
  loadHero(data.results[0]);
}

function loadHero(item){
  const hero=document.getElementById("hero");
  hero.style.backgroundImage=`url(https://image.tmdb.org/t/p/w780${item.backdrop_path||item.poster_path})`;
  hero.innerHTML=`<div class="hero-content">
    <h1>${(item.title||item.name||"").toUpperCase()}</h1>
    <button class="hero-play-btn">▶ Play</button>
  </div>`;
  hero.querySelector(".hero-play-btn").onclick=()=>openMain(item.id,item.title||item.name,item.poster_path||"");
}

function renderResults(items){
  const popularRow=document.getElementById("popularRow");
  popularRow.innerHTML="";
  (items||[]).forEach(item=>{
    if(!item.poster_path) return;
    const card=document.createElement("div");
    card.className="card";
    const img=document.createElement("img");
    img.src=`https://image.tmdb.org/t/p/w300${item.poster_path}`;
    card.onclick=()=>openMain(item.id,item.title||item.name,item.poster_path);
    card.appendChild(img);
    popularRow.appendChild(card);
  });
}

window.openMain=async function(id,title,poster){
  if(currentType==="movie"){
    document.getElementById("playerFrame").src=`https://player.videasy.net/movie/${id}`;
    document.getElementById("playerModal").classList.add("active");
    saveWatch(id,title,poster);
  }else{
    currentSeriesId=id;
    currentSeriesTitle=title;
    currentSeriesPoster=poster;
    await loadSeasons(id);
    document.getElementById("seriesControls").style.display="flex";
  }
};

window.closePlayer=()=>{
  document.getElementById("playerFrame").src="";
  document.getElementById("playerModal").classList.remove("active");
};

async function loadSeasons(id){
  const res=await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
  const data=await res.json();
  const seasonSelect=document.getElementById("seasonSelect");
  seasonSelect.innerHTML="";
  (data.seasons||[]).forEach(s=>{
    if(s.season_number===0) return;
    seasonSelect.innerHTML+=`<option value="${s.season_number}">Season ${s.season_number}</option>`;
  });
  loadEpisodes(id,seasonSelect.value);
}
document.getElementById("seasonSelect").onchange=()=>loadEpisodes(currentSeriesId,document.getElementById("seasonSelect").value);

async function loadEpisodes(id,season){
  const res=await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${season}?api_key=${API_KEY}`);
  const data=await res.json();
  const episodeSelect=document.getElementById("episodeSelect");
  episodeSelect.innerHTML="";
  (data.episodes||[]).forEach(ep=>{
    episodeSelect.innerHTML+=`<option value="${ep.episode_number}">Ep ${ep.episode_number} - ${ep.name}</option>`;
  });
}

document.getElementById("playEpisodeBtn").onclick=async ()=>{
  const seasonSelect=document.getElementById("seasonSelect");
  const episodeSelect=document.getElementById("episodeSelect");
  document.getElementById("playerFrame").src=`https://player.videasy.net/tv/${currentSeriesId}/${seasonSelect.value}/${episodeSelect.value}`;
  document.getElementById("playerModal").classList.add("active");
  saveWatch(currentSeriesId,`${currentSeriesTitle} - S${seasonSelect.value}E${episodeSelect.value}`,currentSeriesPoster,"tv");
};

async function saveWatch(id,title,poster,type="movie"){
  if(!currentUser) return;
  const posterUrl=poster?`https://image.tmdb.org/t/p/w500${poster}`:"";
  const ref=doc(db,"users",currentUser.uid,"watchHistory",id.toString());
  const snap=await getDoc(ref);
  if(snap.exists()){
    await updateDoc(ref,{ watchCount:increment(1), lastWatched:serverTimestamp() });
  }else{
    await setDoc(ref,{
      contentId:id,
      title,
      poster:posterUrl,
      type:type,
      watchCount:1,
      lastWatched:serverTimestamp()
    });
  }
  await addDoc(collection(db,"globalActivity"),{
    userId:currentUser.uid,
    contentId:id,
    title,
    poster:posterUrl,
    type:type,
    watchedAt:serverTimestamp()
  });
  loadActivity();
}

async function loadActivity(){
  const q=query(collection(db,"globalActivity"),orderBy("watchedAt","desc"),limit(5));
  const snap=await getDocs(q);
  const activityFeed=document.getElementById("activityFeed");
  activityFeed.innerHTML="";
  for(const d of snap.docs){
    const data=d.data();
    let username="User";
    const userDoc=await getDoc(doc(db,"users",data.userId));
    if(userDoc.exists()) username=userDoc.data().username||"User";
    const div=document.createElement("div");
    div.className="activity-card";
    div.innerHTML=`<img src="${data.poster||'https://via.placeholder.com/50x70'}" onerror="this.src='https://via.placeholder.com/50x70'">
      <div><strong onclick="showPublicProfile('${data.userId}')">${username}</strong> watched ${data.title}</div>`;
    activityFeed.appendChild(div);
  }
}

async function showPublicProfile(uid){
  showHome();
  document.getElementById("homeSection").classList.remove("active");
  document.getElementById("publicSection").classList.add("active");
  const userDoc=await getDoc(doc(db,"users",uid));
  document.getElementById("publicUsername").innerText=userDoc.data()?.username||"User";
  const snap=await getDocs(collection(db,"users",uid,"watchHistory"));
  const publicGrid=document.getElementById("publicGrid");
  publicGrid.innerHTML="";
  snap.forEach(d=>{
    const img=document.createElement("img");
    img.src=d.data().poster||"https://via.placeholder.com/100x140";
    img.onerror=()=>img.src="https://via.placeholder.com/100x140";
    publicGrid.appendChild(img);
  });
}
window.showPublicProfile=showPublicProfile;

</script>
</body>
</html>
